name: Build BDA release

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    outputs:
      bda_artifact_id: ${{ steps.upload_bda.outputs.artifact-id }}
      bda_sha256: ${{ steps.upload_bda.outputs.artifact-digest }}
      zip_artifact_id: ${{ steps.upload_zip.outputs.artifact-id }}
      zip_sha256: ${{ steps.upload_zip.outputs.artifact-digest }}
    env:
      PYTHONUTF8: "1"

    steps:
      - name: Check out player repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: false

      - name: Check out private SDK submodule
        shell: pwsh
        env:
          SDK_DEPLOY_KEY: ${{ secrets.SDK_DEPLOY_KEY }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          if ([string]::IsNullOrWhiteSpace($env:SDK_DEPLOY_KEY)) {
            throw "Repository secret SDK_DEPLOY_KEY is required to read the private SDK submodule."
          }

          $keyPath = Join-Path $env:RUNNER_TEMP "bbk9588_sdk_deploy_key"
          $keyText = $env:SDK_DEPLOY_KEY.Replace("`r", "").TrimEnd() + "`n"
          [IO.File]::WriteAllText(
            $keyPath,
            $keyText,
            [Text.UTF8Encoding]::new($false)
          )
          & icacls.exe $keyPath /inheritance:r /grant:r "${env:USERNAME}:R" | Out-Null

          git submodule sync -- bbk9588-bda-sdk
          git config submodule.bbk9588-bda-sdk.url `
            ssh://git@ssh.github.com:443/HelloClyde/bbk9588-bda-sdk.git
          $env:GIT_SSH_COMMAND = `
            "ssh -i `"$keyPath`" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          try {
            git submodule update --init --depth 1 -- bbk9588-bda-sdk
          } finally {
            Remove-Item Env:GIT_SSH_COMMAND -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $keyPath -Force -ErrorAction SilentlyContinue
          }

          $expected = git rev-parse HEAD:bbk9588-bda-sdk
          $actual = git -C bbk9588-bda-sdk rev-parse HEAD
          if ($actual -ne $expected) {
            throw "SDK checkout mismatch: expected $expected, got $actual"
          }

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore MIPS toolchain
        uses: actions/cache@v6
        with:
          path: bbk9588-bda-sdk/tools
          key: windows-mipsel-none-elf-15.2.0-v1

      - name: Install MIPS toolchain
        shell: pwsh
        run: ./bbk9588-bda-sdk/scripts/setup_toolchain.ps1

      - name: Build BDA
        run: python build.py --output "应用/程序/GAM4980.BDA"

      - name: Build install ZIP
        run: python package_release.py

      - name: Upload BDA
        id: upload_bda
        uses: actions/upload-artifact@v7
        with:
          path: 应用/程序/GAM4980.BDA
          archive: false
          if-no-files-found: error
          retention-days: 30

      - name: Upload install ZIP
        id: upload_zip
        uses: actions/upload-artifact@v7
        with:
          path: build/gam4980-player-for9588.zip
          archive: false
          if-no-files-found: error
          retention-days: 30

  release:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: build
    runs-on: windows-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download and verify release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          BDA_ARTIFACT_ID: ${{ needs.build.outputs.bda_artifact_id }}
          BDA_SHA256: ${{ needs.build.outputs.bda_sha256 }}
          ZIP_ARTIFACT_ID: ${{ needs.build.outputs.zip_artifact_id }}
          ZIP_SHA256: ${{ needs.build.outputs.zip_sha256 }}
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          New-Item -ItemType Directory -Path release-assets | Out-Null
          $apiRoot = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/actions/artifacts"
          Invoke-WebRequest `
            -Uri "$apiRoot/$env:BDA_ARTIFACT_ID/zip" `
            -Headers $headers `
            -OutFile "release-assets/GAM4980.BDA"
          Invoke-WebRequest `
            -Uri "$apiRoot/$env:ZIP_ARTIFACT_ID/zip" `
            -Headers $headers `
            -OutFile "release-assets/gam4980-player-for9588.zip"

          $expected = @{
            "release-assets/GAM4980.BDA" = $env:BDA_SHA256
            "release-assets/gam4980-player-for9588.zip" = $env:ZIP_SHA256
          }
          foreach ($path in $expected.Keys) {
            $actual = (Get-FileHash -Algorithm SHA256 $path).Hash.ToLowerInvariant()
            $wanted = $expected[$path].ToLowerInvariant() -replace "^sha256:", ""
            if ($actual -ne $wanted) {
              throw "Artifact checksum mismatch: $path"
            }
          }

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:GITHUB_REF_NAME
          $repo = $env:GITHUB_REPOSITORY
          $assets = @(
            "release-assets/gam4980-player-for9588.zip"
            "release-assets/GAM4980.BDA"
          )

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --repo $repo --clobber
          } else {
            gh release create $tag @assets `
              --repo $repo `
              --verify-tag `
              --generate-notes `
              --title "gam4980-player-for9588 $tag"
          }
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to publish GitHub release $tag."
          }
